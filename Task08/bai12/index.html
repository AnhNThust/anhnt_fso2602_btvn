  <script>
    function printMultiplicationTable() {
      let mulTable = "";
      for (let i = 1; i <= 10; i++) {
        for (let j = 1; j <= 10; j++) {
          mulTable = `${mulTable} ${i} x ${j} = ${i * j}\n`;
        }
        mulTable += '\n';
      }

      console.log(mulTable);
    }
