<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <link rel="stylesheet" href="./css/login-form.css">
</head>

<body>
  <form action="" method="post" class="flex-col gap-24">
    <h1 class="text-center">Login</h1>
    <div class="flex-col gap-24">
      <div class="group flex-col gap-8">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="example@email.com">
      </div>

      <div class="group flex-col gap-8">
        <label for="password" class="flex-between">
          Password
          <a href="#">Forgot password?</a>
        </label>
        <input type="password" id="password" name="password" placeholder="**********">
      </div>

      <button type="submit">Login</button>

      <p class="text-center">Don't have account? <a href="#">Create new account</a></p>
    </div>
  </form>
</body>

</html>
