<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="./css/login-form.css" />
</head>

<body>
  <form method="post" class="login-form">
    <div class="login flex-column">
      <h1 class="login-title">Login</h1>

      <div class="login-body flex-column">
        <div class="email-group flex-column gap-8">
          <label for="email">Email</label>
          <input type="text" id="email" name="email" placeholder="example@email.com" required />
        </div>

        <div class="password-group flex-column gap-8">
          <div class="password-label-group flex-row">
            <label for="password">Password</label>
            <a href="#">Forgot password?</a>
          </div>

          <input type="password" id="password" name="password" placeholder="************" required />
        </div>

        <button class="btn-login flex-row">Login</button>

        <p class="login-footer-group flex-row">
          Don't have account?
          <a class="create-new-account" href="">Create new account</a>
        </p>
      </div>
    </div>
  </form>
</body>

</html>
