<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 4</title>
</head>

<body>
  <h2>Bài 4</h2>

  <script>
    function isTriangle(a, b, c) {
      if (isNaN(a) || isNaN(b) || isNaN(c)
        || a <= 0 || b <= 0 || c <= 0) {
        console.log("a hoặc b hoặc c không hợp lệ");
        return;
      }

      return a + b <= c ? false :
        b + c <= a ? false :
          a + c <= b ? false : true;
    }

    let a = +window.prompt("nhap a:");
    let b = +window.prompt("nhap b:");
    let c = +window.prompt("nhap c:");
    isTriangle(a, b, c) ? console.log('a b c là 3 cạnh của 1 tam giác')
      : console.log('a b c không phải 3 cạnh của 1 tam giác');
  </script>
</body>

</html>
