<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 3</title>
</head>

<body>
  <h2>Bài 3</h2>

  <script>
    function sortNumber(a, b, c) {
      if (isNaN(a) || isNaN(b) || isNaN(c)) {
        console.log("a hoặc b hoặc c không hợp lệ");
      }

      let unSort = true;

      while (unSort) {
        if (a < b && b < c) {
          unSort = false;
        }
        if (a > b) {
          a = a + b;
          b = a - b;
          a = a - b;
        }

        if (b > c) {
          b = b + c;
          c = b - c;
          b = b - c;
        }
      }

      console.log("%d %d %d", a, b, c);
    }

    // sortNumber(3, 2, 1);
    let a = +window.prompt("Nhap a:");
    let b = +window.prompt("Nhap b:");
    let c = +window.prompt("Nhap c:");
    sortNumber(a, b, c);
  </script>
</body>

</html>
