<body>
  <h2>Bài 8</h2>

  <script>
    function isSameSign(a, b) {
      if (isNaN(a) || isNaN(b)) {
        console.log("a hoặc b không hợp lệ");
        return;
      }

      if (a * b > 0) {
        console.log(true);
      } else {
        console.log(false);
      }
    }

    let a = +window.prompt("Nhập a:");
    let b = +window.prompt("Nhập b:");
    isSameSign(a, b);

    // isSameSign(10, 20);
    // isSameSign(-10, -20);
    // isSameSign(10, -20);
  </script>
